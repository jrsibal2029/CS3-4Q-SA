  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --forest:   #2a4f3e;
      --cream:    #f5f0ec;
      --brown:    #8b6347;
      --brown-lt: #c4a882;
      --brown-dk: #5c3d24;
      --warm-mid: #d6c4ae;
      --text:     #2b2018;
    }

    body {
      background-color: var(--cream);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      letter-spacing: 0.03em;
      min-height: 100vh;
    }

    header {
        background-color:#2a4f3e;
        color:#e8dfd5;
        position: fixed;
        z-index: 9999;
        font-family: "Cormorant Garamond", serif;
    }

    header a {
        text-decoration: none;
        color:#e8dfd5;
        padding: 6px;
        transition: color ease 0.3s;
    }

    header a:hover {
        color:#c4a882;
    }

    .divider-line {
      width: 48px;
      height: 1px;
      background: var(--brown-lt);
      margin: 2rem 0 0;
    }

    .grid-section {
      padding: 4rem 3rem 6rem;
    }

    .grid-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--warm-mid);
      padding-bottom: 1rem;
    }

    .grid-header h2 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 1.2rem;
      letter-spacing: 0.1em;
      color: var(--brown-dk);
    }

    .grid-header span {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--brown);
    }

    .shoe-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2rem;
    }

    .shoe-card {
      background: #fff;
      border: 1px solid #e8dfd5;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.3s, transform 0.3s;
      overflow: hidden;
    }

    .shoe-card:hover {
      box-shadow: 0 12px 40px rgba(42,79,62,0.12);
      transform: translateY(-4px);
    }

    .card-img-wrap {
      position: relative;
      overflow: hidden;
      aspect-ratio: 1/1;
      background: #faf7f4;
    }

    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.55s ease;
      display: block;
    }

    .shoe-card:hover .card-img-wrap img {
      transform: scale(1.05);
    }

    .card-tag {
      position: absolute;
      top: 1rem;
      left: 1rem;
      background: var(--forest);
      color: var(--cream);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.25rem 0.65rem;
      z-index: 2;
    }

    .card-desc-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(42,79,62,0.93) 0%, rgba(42,79,62,0.5) 70%, transparent 100%);
      color: var(--cream);
      padding: 2rem 1.2rem 1.1rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      font-style: italic;
      font-weight: 300;
      letter-spacing: 0.04em;
      line-height: 1.45;
      text-align: center;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.38s ease, transform 0.38s ease;
      pointer-events: none;
      z-index: 1;
    }

    .shoe-card:hover .card-desc-overlay {
      opacity: 1;
      transform: translateY(0);
    }

    .card-body {
      padding: 1.4rem 1.5rem 1.6rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      flex: 1;
    }

    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 500;
      line-height: 1.25;
      color: var(--brown-dk);
    }

    .card-price {
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      color: var(--brown);
      font-weight: 400;
    }

    .add-btn {
      margin-top: auto;
      padding-top: 1.1rem;
      display: flex;
    }

    .add-btn button {
      width: 100%;
      background: var(--forest);
      color: var(--cream);
      border: none;
      cursor: pointer;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 0.85rem 1rem;
      transition: background 0.25s, letter-spacing 0.25s;
      position: relative;
      overflow: hidden;
    }

    .add-btn button:hover {
      background: var(--brown-dk);
      letter-spacing: 0.35em;
    }

    .add-btn button:active { transform: scale(0.98); }

    .add-btn button.added {
      background: var(--brown);
      pointer-events: none;
    }

    #toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--forest);
      color: var(--cream);
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      padding: 0.85rem 1.5rem;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 9999;
      border-left: 3px solid var(--brown-lt);
    }

    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    footer {
      background: var(--forest);
      color: var(--warm-mid);
      text-align: center;
      padding: 2rem 3rem;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    @media (max-width: 900px) {
      .shoe-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 580px) {
      .shoe-grid { grid-template-columns: 1fr; }
      .grid-section { padding: 3rem 1.5rem 5rem; }
    }
  </style>
</head>

function renderCart() {
  const cart = loadCart();
  const container = document.getElementById('cartDisplay');

  if (!container) return;

  if (cart.length === 0) {
    container.innerHTML = "<p>Your cart is empty.</p>";
    return;
  }

  let total = 0;
  container.innerHTML = "";

  cart.forEach((item, index) => {
    total += item.prod_price;

    const row = document.createElement('div');
    row.style.display = "flex";
    row.style.justifyContent = "space-between";
    row.style.marginBottom = "10px";

    row.innerHTML = `
      <span>${item.prod_name} - PHP ${item.prod_price.toLocaleString()}</span>
      <button data-index="${index}" style="background:var(--brown); color:white; border:none; padding:5px 10px;">Remove</button>
    `;

    container.appendChild(row);
  });

  const totalRow = document.createElement('div');
  totalRow.style.marginTop = "15px";
  totalRow.innerHTML = `<strong>Total: PHP ${total.toLocaleString()}</strong>`;
  container.appendChild(totalRow);

  container.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', function() {
      removeFromCart(this.dataset.index);
    });
  });
}

function removeFromCart(index) {
  const cart = loadCart();
  cart.splice(index, 1);
  saveCart(cart);
  renderCart();
}

          card.innerHTML = `
            <div class="card-img-wrap">
              <img src="${shoe.img}" alt="${shoe.name}" loading="lazy" style="object-position: ${imgPosition};" />
              <span class="card-tag">${shoe.tag}</span>
              <div class="card-desc-overlay">${shoe.desc}</div>
            </div>
            <div class="card-body">
              <p class="card-name">${shoe.name}</p>
              <p class="card-price">${formatPrice(shoe.price)}</p>
              <div class="add-btn">
                <button>Add to Cart</button>
              </div>
            </div>
          `;
          const btn = card.querySelector('button');
          btn.addEventListener('click', () => addToCart(shoe, btn));
          grid.appendChild(card);
        });

        section.appendChild(grid);
        container.appendChild(section);
      });
    }

    renderCollections();
    updateBadge();
    renderCart();

    document.getElementById('checkoutForm').addEventListener('submit', function(e) {

  const cartItems = loadCart(); 

  if (cartItems.length === 0) {
    e.preventDefault();
    alert("Your cart is empty.");
    return;
  }

  document.getElementById('cust_order').value = JSON.stringify(cartItems);
});
  </script>
</body>
</html>
